name: Weekly Matomo Digest

on:
  schedule:
    - cron: '0 14 * * 1' # Every Monday at 14:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  post-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @anthropic-ai/claude-code
      - name: Generate and post analytics report
        run: claude -p "$(cat scripts/matomo-digest-prompt.txt)" --allowedTools "Bash,Read,Glob,Grep" --model claude-opus-4-6 --max-turns 20
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MATOMO_URL: ${{ secrets.MATOMO_URL }}
          MATOMO_TOKEN: ${{ secrets.MATOMO_TOKEN }}
          MATOMO_SITE_ID: ${{ secrets.MATOMO_SITE_ID }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
